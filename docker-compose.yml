version: "1.0"
services:
  telegram-bot:
    build:
      context: ./telegram-bot/
      dockerfile: Dockerfile
    networks:
      - backend_network

  discord-bot:
    build:
      context: ./discord-bot/
      dockerfile: Dockerfile
    networks:
      - backend_network

  db:
    image: postgres
    env_file:
      - ./db/.env
    ports:
      - "5432:5432"
    networks:
      - backend_network

networks:
  backend_network:
    driver: bridge
